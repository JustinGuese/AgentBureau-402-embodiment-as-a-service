# Smithery configuration for AgentBureau
# https://smithery.ai/docs/config

name: AgentBureau
description: The Notary for the Agentic Age: Physical embodiment for AI agents via x402 payments.
version: 1.0.0

# If this repo was the server, we would specify build/run commands here.
# Since it's a website, we point to the hosted endpoint or the other repo.
# However, Smithery often scans the repo it's in.

mcp:
  type: remote
  url: https://agentbureau-api.datafortress.cloud/mcp
  configSchema:
    type: object
    properties:
      AGENT_BUREAU_API_KEY:
        type: string
        description: Not required for x402 but can be used for legacy auth.
